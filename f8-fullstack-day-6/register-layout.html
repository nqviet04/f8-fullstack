<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Login – Register</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="wrapper-form">
      <div class="signup-img">
        <img src="./img/signup-img.jpg" alt="signup-img" />
      </div>
      <div class="signup-form">
        <form action="" class="register-form" autocomplete="off">
          <h1 class="form-title">student registration form</h1>
          <div class="form-wrap">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name :</label>
                <input type="text" id="name" spellcheck="false" required />
              </div>
              <div class="form-group">
                <label for="father-name">Father Name :</label>
                <input
                  type="text"
                  id="father-name"
                  spellcheck="false"
                  required
                />
              </div>
            </div>
            <div class="form-group">
              <label for="address">Address :</label>
              <input type="text" id="address" spellcheck="false" required />
            </div>
            <div class="form-radio">
              <label for="gender">Gender :</label>
              <div class="radio-item">
                <input type="radio" name="gender" id="male" checked />
                <label for="male">Male</label>
              </div>
              <div class="radio-item">
                <input type="radio" name="gender" id="female" />
                <label for="female">Female</label>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="state">State :</label>
                <input type="text" id="state" spellcheck="false" required />
              </div>
              <div class="form-group">
                <label for="city">City :</label>
                <input type="text" id="city" spellcheck="false" required />
              </div>
            </div>
            <div class="form-group">
              <label for="dob">DOB :</label>
              <input type="text" id="dob" spellcheck="false" required />
            </div>
            <div class="form-group">
              <label for="pincode">Pincode :</label>
              <input type="text" id="pincode" spellcheck="false" required />
            </div>
            <div class="form-group">
              <label for="course">Course :</label>
              <input type="text" id="course" spellcheck="false" required />
            </div>
            <div class="form-group">
              <label for="email">Email :</label>
              <input type="email" id="email" spellcheck="false" required />
            </div>
          </div>
          <div class="form-btn">
            <button class="btn-reset">Reset All</button>
            <button class="btn-submit">Submit Form</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
